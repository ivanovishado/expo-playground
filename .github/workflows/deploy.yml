name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      # workflow_run: reuse build output from CI
      - name: Download build output from CI
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # workflow_dispatch: build from scratch
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'

      - uses: actions/setup-node@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: github.event_name == 'workflow_dispatch'

      - name: Cache Next.js build
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build
        if: github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
